syntax = "proto3";

package credential;

// DB -----------
import "google/protobuf/timestamp.proto";
import "options/gorm.proto";

import "credential/pb/private.proto";
import "credential/pb/public.proto";
import "credential/pb/realm.proto";
import "provenance/pb/source.proto";

// Core credential that combines Private, Public, and/or Realm so that credential.Private or
// credential.Public that are gathered from a credential.Realm} are properly scoped when used.
//
// A core credential must always have at least one provenance.Source (its origin — the former
// credential.Origin, now absorbed into the shared Source), but only needs 1 of Private,
// Public, or Realm set.
message Core {
  option (gorm.opts).ormable = true;
  string Id = 1 [(gorm.field).tag = {type:"uuid" primary_key: true}];
  google.protobuf.Timestamp CreatedAt = 4;
  google.protobuf.Timestamp UpdatedAt = 5;

  // Sources - The provenance of this credential (its origin). Replaces the former
  // credential.Origin: OriginType maps to SourceType (Manual/Import/Cracked/Service), and
  // Cracker/Filename/SessionId/ServiceId are carried on provenance.Source. Many-to-many so
  // the same credential reported by several tools accumulates their contributions.
  // @gotags: display:"Sources"
  repeated provenance.Source Sources = 14 [(gorm.field).many_to_many = {}];

  // Private - The credential.Private either gathered from Realm,
  // or used to credential.ReplayableHash authenticate into the realm.
  Private Private = 11;

  // Public - The credential.Public gathered from Realm. 
  Public Public = 12;

  // Realm - credential.Realm where Private and/or Public was gathered
  // and/or the credential.Realm to which Private and/or Public can be
  // used to authenticate.
  Realm Realm = 13;

  // repeated Login Logins = 14;
  int32 LoginsCount = 8;
}
